<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aditz laguntzaileak · Beta-Urreko</title>
  <style>
    :root {
      --subject: #15803D;
      --subject-dark: #166534;
      --subject-soft: #DCFCE7;
      --subject-soft-2: #F0FDF4;
      --correct: #2E7D32;
      --error: #C62828;
      --warning: #E67E22;
      --info: #1E88E5;
      --secondary: #6B7280;
      --ink: #111827;
      --muted: #4B5563;
      --line: #D1D5DB;
      --card: #FFFFFF;
      --bg: #F3F4F6;
      --shadow: 0 18px 50px rgba(17, 24, 39, 0.12);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      min-height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(21, 128, 61, 0.16), transparent 36rem),
        linear-gradient(180deg, #F8FAFC 0%, var(--bg) 100%);
      color: var(--ink);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
    }

    .page {
      width: min(100%, 1040px);
      margin: 0 auto;
      padding: 24px;
    }

    .shell {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(209, 213, 219, 0.9);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fadeIn 0.28s ease-out both;
    }

    .shell.narrow {
      width: min(100%, 760px);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid rgba(209, 213, 219, 0.75);
      background: #FFFFFF;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 999px;
      background: var(--subject);
      color: #FFFFFF;
      font-weight: 900;
      letter-spacing: -0.04em;
      box-shadow: 0 10px 22px rgba(21, 128, 61, 0.25);
    }

    .brand-text {
      font-weight: 900;
      color: var(--subject-dark);
      white-space: nowrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--subject-soft);
      color: var(--subject-dark);
      font-size: 0.88rem;
      font-weight: 800;
      border: 1px solid rgba(21, 128, 61, 0.18);
    }

    .hero {
      padding: 30px 26px 26px;
      background:
        linear-gradient(135deg, rgba(21, 128, 61, 0.96), rgba(22, 101, 52, 0.98)),
        var(--subject);
      color: white;
    }

    .hero h1,
    .results-title,
    .quiz-title {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .hero p {
      margin: 12px 0 0;
      color: rgba(255, 255, 255, 0.88);
      font-size: 1.04rem;
      line-height: 1.6;
      max-width: 62ch;
    }

    .content {
      padding: 26px;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 1.5rem;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .section-text {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .intro-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 20px 0;
    }

    .mini-card,
    .example-card,
    .mode-card,
    .question-card,
    .feedback-card,
    .score-card,
    .mistake-card,
    .help-card {
      border-radius: var(--radius-lg);
      border: 1px solid rgba(209, 213, 219, 0.9);
      background: #FFFFFF;
    }

    .mini-card {
      padding: 16px;
      background: var(--subject-soft-2);
      border-color: rgba(21, 128, 61, 0.22);
    }

    .mini-card strong {
      display: block;
      color: var(--subject-dark);
      font-size: 1.05rem;
      margin-bottom: 6px;
    }

    .mini-card span,
    .example-card p,
    .mode-card p,
    .help-card p {
      color: var(--muted);
      line-height: 1.5;
    }

    .example-wrap {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin: 18px 0 24px;
    }

    .example-card {
      padding: 16px;
      background: #F9FAFB;
    }

    .example-card h3,
    .mode-card h3,
    .help-card h3 {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .example-sentence {
      display: block;
      margin-top: 10px;
      padding: 12px;
      border-radius: var(--radius-md);
      background: #FFFFFF;
      border: 1px dashed rgba(21, 128, 61, 0.35);
      font-weight: 800;
      color: var(--ink);
      line-height: 1.5;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .mode-card {
      width: 100%;
      min-height: 190px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 18px;
      text-align: left;
      background: #F9FAFB;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .mode-card:hover:not(:disabled),
    .mode-card:focus-visible {
      transform: translateY(-2px);
      background: var(--subject-soft-2);
      border-color: rgba(21, 128, 61, 0.55);
      box-shadow: 0 12px 28px rgba(21, 128, 61, 0.14);
      outline: none;
    }

    .mode-card:disabled {
      opacity: 0.58;
      background: #F3F4F6;
    }

    .mode-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: var(--subject);
      color: white;
      font-weight: 900;
    }

    .mode-card:disabled .mode-number {
      background: var(--secondary);
    }

    .keyboard-note {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      background: #EFF6FF;
      color: #1E3A8A;
      border: 1px solid rgba(30, 136, 229, 0.2);
      line-height: 1.5;
      font-weight: 650;
    }

    .quiz-head {
      padding: 24px 26px;
      background: linear-gradient(135deg, var(--subject), var(--subject-dark));
      color: #FFFFFF;
    }

    .quiz-head-row {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .quiz-kicker {
      margin: 0 0 8px;
      color: rgba(255, 255, 255, 0.86);
      font-weight: 800;
    }

    .quiz-subtitle {
      margin: 10px 0 0;
      color: rgba(255, 255, 255, 0.84);
      line-height: 1.45;
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: #FFFFFF;
      font-weight: 800;
      white-space: nowrap;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .icon-button:hover,
    .icon-button:focus-visible {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
      outline: none;
    }

    .progress-box {
      padding: 18px 26px;
      background: #F9FAFB;
      border-bottom: 1px solid rgba(209, 213, 219, 0.9);
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--ink);
      font-weight: 800;
    }

    .progress-track {
      width: 100%;
      height: 12px;
      background: #E5E7EB;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: var(--subject);
      border-radius: inherit;
      transition: width 0.25s ease;
    }

    .question-card {
      padding: clamp(18px, 4vw, 26px);
      background: #FFFBEB;
      border-left: 7px solid var(--subject);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55);
    }

    .question-text {
      margin: 0;
      font-size: clamp(1.45rem, 4vw, 2.15rem);
      line-height: 1.45;
      color: #1F2937;
    }

    .verb {
      font-weight: 950;
      color: #111827;
      margin: 0 0.2em;
    }

    .answer-blank {
      display: inline-block;
      min-width: 86px;
      margin: 0 0.2em;
      padding: 0 0.1em;
      font-weight: 950;
      color: var(--subject-dark);
      border-bottom: 4px dashed rgba(21, 128, 61, 0.55);
      text-align: center;
    }

    .question-help {
      margin: 14px 0 0;
      color: #6B7280;
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .options-grid {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .answer-button {
      width: 100%;
      min-height: 58px;
      padding: 13px 16px;
      border: 2px solid #D1D5DB;
      border-radius: var(--radius-md);
      background: #F3F4F6;
      color: #111827;
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.08);
      font-size: 1.18rem;
      font-weight: 900;
      text-align: left;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .answer-button:hover:not(:disabled),
    .answer-button:focus-visible {
      transform: translateY(-1px);
      background: var(--subject-soft-2);
      border-color: rgba(21, 128, 61, 0.55);
      box-shadow: 0 12px 22px rgba(21, 128, 61, 0.12);
      outline: none;
    }

    .answer-button .option-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      margin-right: 8px;
      border-radius: 999px;
      background: #E5E7EB;
      color: #4B5563;
      font-size: 0.92rem;
      font-weight: 950;
    }

    .answer-button.selected-waiting {
      background: #EFF6FF;
      border-color: var(--info);
      color: #1E3A8A;
      box-shadow: 0 0 0 4px rgba(30, 136, 229, 0.14);
    }

    .answer-button.correct {
      background: #E8F5E9;
      border-color: var(--correct);
      color: #14532D;
      box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.14);
    }

    .answer-button.incorrect {
      background: #FEE2E2;
      border-color: var(--error);
      color: #7F1D1D;
      box-shadow: 0 0 0 4px rgba(198, 40, 40, 0.14);
    }

    .answer-button.dimmed {
      opacity: 0.56;
      background: #F3F4F6;
      color: #6B7280;
      box-shadow: none;
    }

    .feedback-card {
      margin-top: 18px;
      padding: 16px;
      border-left: 7px solid var(--info);
      line-height: 1.58;
      animation: fadeIn 0.22s ease-out both;
    }

    .feedback-card.correct {
      background: #E8F5E9;
      border-color: var(--correct);
      color: #14532D;
    }

    .feedback-card.incorrect {
      background: #FEE2E2;
      border-color: var(--error);
      color: #7F1D1D;
    }

    .feedback-card.info {
      background: #EFF6FF;
      border-color: var(--info);
      color: #1E3A8A;
    }

    .feedback-card p {
      margin: 0;
    }

    .feedback-card p + p {
      margin-top: 8px;
    }

    details {
      margin-top: 12px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(209, 213, 219, 0.9);
      padding: 12px 14px;
    }

    summary {
      cursor: pointer;
      font-weight: 900;
      color: inherit;
    }

    .long-explanation {
      margin-top: 12px;
      font-size: 0.96rem;
      color: #374151;
    }

    .long-explanation p {
      margin: 10px 0 0;
    }

    .long-explanation ol {
      margin: 10px 0 0;
      padding-left: 1.35rem;
    }

    .long-explanation li {
      margin: 8px 0;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .result-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
      margin-top: 22px;
    }

    .primary-button,
    .secondary-button,
    .dark-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 52px;
      padding: 13px 18px;
      border-radius: 999px;
      border: 2px solid transparent;
      font-weight: 900;
      transition: transform 0.16s ease, background 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .primary-button {
      background: var(--subject);
      color: #FFFFFF;
      box-shadow: 0 12px 24px rgba(21, 128, 61, 0.25);
    }

    .primary-button:hover:not(:disabled),
    .primary-button:focus-visible {
      background: var(--subject-dark);
      transform: translateY(-1px);
      outline: none;
      box-shadow: 0 14px 28px rgba(21, 128, 61, 0.3);
    }

    .primary-button:disabled {
      background: #D1D5DB;
      color: #6B7280;
      box-shadow: none;
    }

    .secondary-button {
      background: var(--subject-soft-2);
      color: var(--subject-dark);
      border-color: rgba(21, 128, 61, 0.24);
    }

    .secondary-button:hover:not(:disabled),
    .secondary-button:focus-visible {
      background: var(--subject-soft);
      transform: translateY(-1px);
      outline: none;
    }

    .dark-button {
      background: #111827;
      color: #FFFFFF;
    }

    .dark-button:hover:not(:disabled),
    .dark-button:focus-visible {
      background: #030712;
      transform: translateY(-1px);
      outline: none;
    }

    .dark-button:disabled,
    .secondary-button:disabled {
      background: #E5E7EB;
      color: #9CA3AF;
      border-color: #E5E7EB;
      box-shadow: none;
    }

    .results-wrap {
      padding: 28px 26px;
      text-align: center;
    }

    .results-emoji {
      display: block;
      font-size: 4.4rem;
      line-height: 1;
      margin: 4px 0 14px;
    }

    .results-message {
      margin: 12px auto 22px;
      max-width: 55ch;
      color: var(--muted);
      font-size: 1.12rem;
      line-height: 1.55;
      font-weight: 750;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin: 22px 0;
    }

    .score-card {
      padding: 18px;
      background: #F9FAFB;
    }

    .score-label {
      margin: 0 0 8px;
      color: #6B7280;
      font-size: 0.82rem;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .score-value {
      margin: 0;
      font-size: clamp(2.4rem, 7vw, 4rem);
      line-height: 1;
      font-weight: 950;
      color: var(--subject-dark);
    }

    .mistakes-wrap {
      margin-top: 22px;
      text-align: left;
    }

    .mistakes-title {
      margin: 0 0 12px;
      font-size: 1.25rem;
      color: #111827;
    }

    .mistake-card {
      padding: 16px;
      margin-top: 12px;
      background: #FEF2F2;
      border-color: #FECACA;
    }

    .mistake-card.no-mistakes {
      background: #E8F5E9;
      border-color: rgba(46, 125, 50, 0.22);
    }

    .mistake-card p {
      margin: 7px 0 0;
      color: #374151;
      line-height: 1.48;
    }

    .text-good {
      color: var(--correct);
      font-weight: 950;
    }

    .text-bad {
      color: var(--error);
      font-weight: 950;
    }

    .text-subject {
      color: var(--subject-dark);
      font-weight: 950;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 820px) {
      .page {
        padding: 14px;
      }

      .intro-grid,
      .example-wrap,
      .mode-grid,
      .score-grid,
      .result-actions {
        grid-template-columns: 1fr;
      }

      .mode-card {
        min-height: auto;
      }

      .quiz-head-row,
      .topbar,
      .progress-meta {
        align-items: flex-start;
        flex-direction: column;
      }

      .icon-button {
        width: 100%;
      }
    }

    @media (max-width: 520px) {
      .content,
      .quiz-head,
      .progress-box,
      .results-wrap {
        padding: 20px;
      }

      .hero {
        padding: 24px 20px;
      }

      .brand-text {
        white-space: normal;
      }

      .answer-button {
        font-size: 1.08rem;
      }
    }
  </style>
</head>

      { sentence: "Zuek erlojuak hari ", correct: "dizkiozue", incorrect: ["dizkiogu", "diezue"], info: "Nor/Zer (haiek) · Nori (hari) · Nork (zuek) → dizkiozue" },
      { sentence: "Haiek sarrerak niri ", correct: "dizkidate", incorrect: ["didate", "dizkizute"], info: "Nor/Zer (haiek) · Nori (niri) · Nork (haiek) → dizkidate" },
      { sentence: "Haiek gauzak zuei ", correct: "dizkizuete", incorrect: ["dizuete", "dizkiete"], info: "Nor/Zer (haiek) · Nori (zuei) · Nork (haiek) → dizkizuete" },
      { sentence: "Guk haiei zerbait ", correct: "diegu", incorrect: ["dizkiegu", "diogu"], info: "Nor/Zer (hura) · Nori (haiei) · Nork (guk) → diegu" },
      { sentence: "Hark txakurra haiei ", correct: "die", incorrect: ["ditu", "dizkie"], info: "Nor/Zer (hura) · Nori (haiei) · Nork (hark) → die" },
      { sentence: "Nik bizikleta hari ", correct: "diot", incorrect: ["diet", "diozu"], info: "Nor/Zer (hura) · Nori (hari) · Nork (nik) → diot" },
      { sentence: "Haiek aulkiak zuei ", correct: "dizkizuete", incorrect: ["dizkigute", "diezue"], info: "Nor/Zer (haiek) · Nori (zuei) · Nork (haiek) → dizkizuete" },
      { sentence: "Zuk botilak niri ", correct: "dizkidazu", incorrect: ["dizkizu", "dizkit"], info: "Nor/Zer (haiek) · Nori (niri) · Nork (zuk) → dizkidazu" },
      { sentence: "Zuek mezua guri ", correct: "diguzue", incorrect: ["dizuet", "dizkiguzue"], info: "Nor/Zer (hura) · Nori (guri) · Nork (zuek) → diguzue" },
      { sentence: "Guk kamiseta hari ", correct: "diogu", incorrect: ["dizkiogu", "dizuet"], info: "Nor/Zer (hura) · Nori (hari) · Nork (guk) → diogu" },
      { sentence: "Zuek opari bat guri ", correct: "diguzue", incorrect: ["dizue", "dizkiguzue"], info: "Nor/Zer (hura) · Nori (guri) · Nork (zuek) → diguzue" },
      { sentence: "Zuk guri liburuak ", correct: "dizkiguzu", incorrect: ["diguzu", "dizkigu"], info: "Nor/Zer (haiek) · Nori (guri) · Nork (zuk) → dizkiguzu" }
    ];

    const quizData = baseQuizData.map((question, index) => ({
      ...question,
      id: index + 1
    }));

    const modeConfig = {
      practice: {
        name: "Praktika",
        emoji: "🧠",
        description: "Erantzun ondoren zuzenketa eta azalpena berehala ikusiko dituzu.",
        immediateFeedback: true,
        showScoreDuringGame: true
      },
      exam: {
        name: "Azterketa",
        emoji: "📝",
        description: "Amaierara arte ez duzu zuzenketarik ikusiko.",
        immediateFeedback: false,
        showScoreDuringGame: false
      },
      review: {
        name: "Akatsen errepasoa",
        emoji: "🔁",
        description: "Azken saiakeran huts egindako galderak bakarrik landuko dituzu.",
        immediateFeedback: true,
        showScoreDuringGame: true
      }
    };

    const app = document.getElementById("app");

    const state = {
      screen: "menu",
      mode: null,
      questions: [],
      currentQuestionIndex: 0,
      score: 0,
      feedback: null,
      selectedOption: null,
      shuffledOptions: [],
      mistakes: [],
      lastMistakes: [],
      answers: []
    };

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function shuffleArray(array) {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    }

    function cleanQuestionPool(questionPool) {
      return questionPool.map(({ selected, isCorrect, ...question }) => question);
    }

    function getCurrentQuestion() {
      return state.questions[state.currentQuestionIndex];
    }

    function getCurrentModeConfig() {
      return state.mode ? modeConfig[state.mode] : null;
    }

    function startQuiz(nextMode, questionPool = quizData) {
      if (nextMode === "review" && questionPool.length === 0) return;

      state.mode = nextMode;
      state.questions = shuffleArray(cleanQuestionPool(questionPool));
      state.currentQuestionIndex = 0;
      state.score = 0;
      state.feedback = null;
      state.selectedOption = null;
      state.shuffledOptions = [];
      state.mistakes = [];
      state.answers = [];
      state.screen = "quiz";
      prepareQuestion();
      render();
    }

    function goToMenu() {
      state.screen = "menu";
      state.mode = null;
      state.questions = [];
      state.currentQuestionIndex = 0;
      state.feedback = null;
      state.selectedOption = null;
      state.shuffledOptions = [];
      render();
    }

    function prepareQuestion() {
      const currentQuestion = getCurrentQuestion();
      if (!currentQuestion) return;
      state.shuffledOptions = shuffleArray([currentQuestion.correct, ...currentQuestion.incorrect]);
      state.feedback = null;
      state.selectedOption = null;
    }

    function handleAnswerClick(option) {
      const currentQuestion = getCurrentQuestion();
      const currentModeConfig = getCurrentModeConfig();
      if (state.selectedOption || !currentQuestion || !currentModeConfig) return;

      const isCorrect = option === currentQuestion.correct;
      const answerRecord = { ...currentQuestion, selected: option, isCorrect };

      state.selectedOption = option;
      state.answers.push(answerRecord);

      if (isCorrect) {
        state.score += 1;
        if (currentModeConfig.immediateFeedback) state.feedback = "correct";
      } else {
        state.mistakes.push(answerRecord);
        if (currentModeConfig.immediateFeedback) state.feedback = "incorrect";
      }

      render();
    }

    function finishQuiz() {
      state.lastMistakes = [...state.mistakes];
      state.screen = "results";
      render();
    }

    function handleNext() {
      if (!state.selectedOption) return;

      const nextIndex = state.currentQuestionIndex + 1;
      if (nextIndex < state.questions.length) {
        state.currentQuestionIndex = nextIndex;
        prepareQuestion();
      } else {
        finishQuiz();
        return;
      }
      render();
    }

    function getResultMessage(percentage) {
      if (percentage < 50) {
        return {
          text: "Ez etsi. Akatsak errepasatu eta berriro saiatu.",
          colorClass: "bad",
          emoji: "📚"
        };
      }

      if (percentage < 80) {
        return {
          text: "Ondo egina. Bide onean zaude.",
          colorClass: "middle",
          emoji: "🌟"
        };
      }

      return {
        text: "Zorionak! Lan bikaina egin duzu.",
        colorClass: "good",
        emoji: "🎉"
      };
    }

    function renderBrand() {
      return `
        <div class="brand" aria-label="Beta-Urreko">
          <span class="brand-badge" aria-hidden="true">BU</span>
          <span class="brand-text">Beta-Urreko</span>
        </div>
      `;
    }

    function renderQuestionText(question, answer = "...") {
      return `
        <span>${escapeHtml(question.sentence)}</span>
        <span class="verb">eman</span>
        <span class="answer-blank">${escapeHtml(answer)}</span><span>.</span>
      `;
    }

    function parseQuestionInfo(info) {
      const match = info.match(/Nor\/Zer \(([^)]+)\) · Nori \(([^)]+)\) · Nork \(([^)]+)\) → (.+)$/);
      if (!match) return null;

      return {
        norZer: match[1],
        nori: match[2],
        nork: match[3],
        result: match[4]
      };
    }

    function renderExpandedExplanation(question, selectedAnswer = null) {
      const parsed = parseQuestionInfo(question.info);
      if (!parsed) {
        return `<p class="long-explanation">${escapeHtml(question.info)}</p>`;
      }

      const objectTip = parsed.norZer === "haiek"
        ? "Nor/Zer plurala da. Horregatik aditz laguntzaileak pluraltasuna markatu behar du; forma askotan <strong>-zki-</strong> zatia agertzen da."
        : "Nor/Zer singularra da. Horregatik ez da pluraleko <strong>-zki-</strong> marka behar.";

      const selectedParagraph = selectedAnswer && selectedAnswer !== question.correct
        ? `<p>Zuk aukeratutako <span class="text-bad">${escapeHtml(selectedAnswer)}</span> forma antzekoa izan daiteke, baina ez dator bat esaldiko hiru elementuekin batera: <strong>${escapeHtml(parsed.norZer)}</strong>, <strong>${escapeHtml(parsed.nori)}</strong> eta <strong>${escapeHtml(parsed.nork)}</strong>.</p>`
        : "";

      return `
        <div class="long-explanation">
          <p>Galdera hau egiteko, begiratu beti hiru atalak ordena berean:</p>
          <ol>
            <li><strong>Nor/Zer:</strong> ${escapeHtml(parsed.norZer)}. <span>Horrek adierazten du zer ematen den.</span></li>
            <li><strong>Nori:</strong> ${escapeHtml(parsed.nori)}. <span>Horrek adierazten du nork jasotzen duen.</span></li>
            <li><strong>Nork:</strong> ${escapeHtml(parsed.nork)}. <span>Horrek adierazten du ekintza nork egiten duen.</span></li>
          </ol>
          <p>${objectTip}</p>
          ${selectedParagraph}
          <p>Beraz, forma egokia <span class="text-good">${escapeHtml(question.correct)}</span> da.</p>
        </div>
      `;
    }

    function getButtonClass(option) {
      const currentQuestion = getCurrentQuestion();
      const currentModeConfig = getCurrentModeConfig();

      if (!state.selectedOption) return "answer-button";

      if (!currentModeConfig.immediateFeedback) {
        return option === state.selectedOption
          ? "answer-button selected-waiting"
          : "answer-button dimmed";
      }

      if (option === currentQuestion.correct) return "answer-button correct";
      if (option === state.selectedOption) return "answer-button incorrect";
      return "answer-button dimmed";
    }

    function renderMenu() {
      const reviewDisabled = state.lastMistakes.length === 0;

      return `
        <main class="page">
          <section class="shell" aria-labelledby="page-title">
            <div class="topbar">
              ${renderBrand()}
            </div>

            <header class="hero">
              <h1 id="page-title">Aditz laguntzaileak</h1>
              <p>Nor/Zer-Nori-Nork egitura lantzeko jolasa. Esaldi bakoitzean <strong>eman</strong> aditzarekin doan aditz laguntzaile zuzena aukeratu behar duzu.</p>
            </header>

            <div class="content">
              <section aria-labelledby="explanation-title">
                <h2 id="explanation-title" class="section-title">Hasi aurretik: zer begiratu behar da?</h2>
                <p class="section-text">Erantzuna aukeratu aurretik, ez begiratu hitz bakar bati. Hiru galdera egin behar dira beti.</p>

                <div class="intro-grid">
                  <article class="mini-card">
                    <strong>1 · Nor/Zer?</strong>
                    <span>Zer ematen da? Gauza bakarra bada singularra da; gauza batzuk badira plurala da.</span>
                  </article>
                  <article class="mini-card">
                    <strong>2 · Nori?</strong>
                    <span>Nork jasotzen du? Niri, zuri, hari, guri, zuei edo haiei izan daiteke.</span>
                  </article>
                  <article class="mini-card">
                    <strong>3 · Nork?</strong>
                    <span>Nork egiten du ekintza? Nik, zuk, hark, guk, zuek edo haiek.</span>
                  </article>
                </div>

                <div class="example-wrap">
                  <article class="example-card">
                    <h3>Adibidea: singularra</h3>
                    <p><strong>Liburu bat</strong> ematen da; beraz, Nor/Zer singularra da.</p>
                    <span class="example-sentence">Nik liburu bat zuri eman <span class="text-subject">dizut</span>.</span>
                  </article>
                  <article class="example-card">
                    <h3>Adibidea: plurala</h3>
                    <p><strong>Liburuak</strong> ematen dira; askotan pluralean <strong>-zki-</strong> marka agertzen da.</p>
                    <span class="example-sentence">Nik liburuak zuri eman <span class="text-subject">dizkizut</span>.</span>
                  </article>
                </div>

                <article class="help-card" style="padding:16px; background:#F9FAFB; margin-bottom:24px;">
                  <h3>Jokoaren helburua</h3>
                  <p>Helburua ez da erantzuna buruz asmatzea bakarrik: esaldiko hiru elementuak azkar identifikatu eta forma egokia aukeratzea da.</p>
                </article>
              </section>

              <section aria-labelledby="mode-title">
                <h2 id="mode-title" class="section-title">Aukeratu jolasteko modua</h2>
                <p class="section-text">Erabili botoiak edo teklatuko zenbakiak.</p>

                <div class="mode-grid">
                  <button type="button" class="mode-card" data-action="start" data-mode="practice">
                    <span class="mode-number">1</span>
                    <span>
                      <h3>${modeConfig.practice.emoji} ${modeConfig.practice.name}</h3>
                      <p>${modeConfig.practice.description}</p>
                    </span>
                    <strong>Hasi praktika</strong>
                  </button>

                  <button type="button" class="mode-card" data-action="start" data-mode="exam">
                    <span class="mode-number">2</span>
                    <span>
                      <h3>${modeConfig.exam.emoji} ${modeConfig.exam.name}</h3>
                      <p>${modeConfig.exam.description}</p>
                    </span>
                    <strong>Hasi azterketa</strong>
                  </button>

                  <button type="button" class="mode-card" data-action="start" data-mode="review" ${reviewDisabled ? "disabled" : ""}>
                    <span class="mode-number">3</span>
                    <span>
                      <h3>${modeConfig.review.emoji} ${modeConfig.review.name}</h3>
                      <p>${reviewDisabled ? "Oraindik ez dago akatsik errepasatzeko." : modeConfig.review.description}</p>
                    </span>
                    <strong>${reviewDisabled ? "Lehenengo saiakera egin" : "Akatsak landu"}</strong>
                  </button>
                </div>

                <div class="keyboard-note">Teklatua: <strong>1</strong>, <strong>2</strong> edo <strong>3</strong> modua aukeratzeko. Jokoan: <strong>1-3</strong> erantzuteko, <strong>Enter</strong> hurrengora joateko eta <strong>M</strong> menura itzultzeko.</div>
              </section>
            </div>
          </section>
        </main>
      `;
    }

    function renderQuiz() {
      const currentQuestion = getCurrentQuestion();
      const currentModeConfig = getCurrentModeConfig();
      const totalQuestions = state.questions.length;
      const progress = totalQuestions > 0 ? Math.round(((state.currentQuestionIndex + 1) / totalQuestions) * 100) : 0;

      const optionButtons = state.shuffledOptions.map((option, index) => `
        <button
          type="button"
          class="${getButtonClass(option)}"
          data-action="answer"
          data-option="${escapeHtml(option)}"
          ${state.selectedOption ? "disabled" : ""}
          aria-pressed="${state.selectedOption === option ? "true" : "false"}"
        >
          <span class="option-index">${index + 1}</span>${escapeHtml(option)}
        </button>
      `).join("");

      let feedbackHtml = "";
      if (currentModeConfig.immediateFeedback && state.feedback) {
        const isCorrect = state.feedback === "correct";
        feedbackHtml = `
          <div class="feedback-card ${isCorrect ? "correct" : "incorrect"}" aria-live="polite">
            <p><strong>${isCorrect ? "✔️ Zuzena!" : "❌ Okerra."}</strong></p>
            ${!isCorrect ? `<p><strong>Erantzun zuzena:</strong> ${escapeHtml(currentQuestion.correct)}</p>` : ""}
            <p><strong>Azalpena:</strong> ${escapeHtml(currentQuestion.info)}</p>
            <details>
              <summary>Azalpen luzea zabaldu</summary>
              ${renderExpandedExplanation(currentQuestion, state.selectedOption)}
            </details>
          </div>
        `;
      }

      if (!currentModeConfig.immediateFeedback && state.selectedOption) {
        feedbackHtml = `
          <div class="feedback-card info" aria-live="polite">
            <p><strong>Erantzuna gordeta.</strong> Zuzenketa amaieran ikusiko duzu.</p>
          </div>
        `;
      }

      return `
        <main class="page">
          <section class="shell narrow" aria-labelledby="quiz-title">
            <div class="topbar">
              ${renderBrand()}
              <span class="tag">${currentModeConfig.emoji} ${currentModeConfig.name}</span>
            </div>

            <header class="quiz-head">
              <div class="quiz-head-row">
                <div>
                  <p class="quiz-kicker">Nor/Zer-Nori-Nork · Orainaldia</p>
                  <h1 id="quiz-title" class="quiz-title">Aditz laguntzaileak</h1>
                  <p class="quiz-subtitle">Aukeratu esaldia osatzeko forma zuzena.</p>
                </div>
                <button type="button" class="icon-button" data-action="menu">← Menura · M</button>
              </div>
            </header>

            <div class="progress-box">
              <div class="progress-meta">
                <span>Galdera: ${state.currentQuestionIndex + 1} / ${totalQuestions}</span>
                <span>${currentModeConfig.showScoreDuringGame ? `Puntuazioa: ${state.score}` : "Puntuazioa amaieran"}</span>
              </div>
              <div class="progress-track" aria-label="Aurrerapena: ${progress}%">
                <div class="progress-fill" style="width:${progress}%"></div>
              </div>
            </div>

            <div class="content">
              <article class="question-card">
                <p class="question-text">${renderQuestionText(currentQuestion, state.selectedOption || "...")}</p>
                <p class="question-help">Aukeratu aditz laguntzaile zuzena. Gogoratu: Nor/Zer, Nori eta Nork begiratu behar dira.</p>
              </article>

              <div class="options-grid" role="group" aria-label="Erantzun aukerak">
                ${optionButtons}
              </div>

              ${feedbackHtml}

              <div class="action-row">
                <button type="button" class="primary-button" data-action="next" ${!state.selectedOption ? "disabled" : ""}>
                  ${state.currentQuestionIndex + 1 === totalQuestions ? "🏆 Emaitzak ikusi · Enter" : "Hurrengo galdera · Enter"}
                </button>
              </div>
            </div>
          </section>
        </main>
      `;
    }

    function renderResults() {
      const currentModeConfig = getCurrentModeConfig();
      const totalQuestions = state.questions.length;
      const percentage = totalQuestions > 0 ? Math.round((state.score / totalQuestions) * 100) : 0;
      const result = getResultMessage(percentage);

      const mistakesHtml = state.mistakes.length > 0
        ? `
          <div class="mistakes-wrap">
            <h2 class="mistakes-title">Errepasatzeko galderak</h2>
            ${state.mistakes.map((mistake, index) => `
              <article class="mistake-card">
                <strong>${index + 1}. ${renderQuestionText(mistake)}</strong>
                <p>Zure erantzuna: <span class="text-bad">${escapeHtml(mistake.selected)}</span></p>
                <p>Erantzun zuzena: <span class="text-good">${escapeHtml(mistake.correct)}</span></p>
                <p>Azalpena: ${escapeHtml(mistake.info)}</p>
                <details>
                  <summary>Azalpen luzea zabaldu</summary>
                  ${renderExpandedExplanation(mistake, mistake.selected)}
                </details>
              </article>
            `).join("")}
          </div>
        `
        : `
          <div class="mistakes-wrap">
            <article class="mistake-card no-mistakes">
              <h2 class="mistakes-title">Ez dago akatsik errepasatzeko.</h2>
              <p>Galdera guztiak ondo egin dituzu.</p>
            </article>
          </div>
        `;

      return `
        <main class="page">
          <section class="shell narrow" aria-labelledby="results-title">
            <div class="topbar">
              ${renderBrand()}
              <span class="tag">${currentModeConfig ? currentModeConfig.name : "Emaitzak"}</span>
            </div>

            <div class="results-wrap">
              <span class="results-emoji" aria-hidden="true">${result.emoji}</span>
              <h1 id="results-title" class="results-title">Emaitzak</h1>
              <p class="results-message">${result.text}</p>

              <div class="score-grid">
                <article class="score-card">
                  <p class="score-label">Puntuazioa</p>
                  <p class="score-value">${state.score} / ${totalQuestions}</p>
                </article>
                <article class="score-card">
                  <p class="score-label">Ehunekoa</p>
                  <p class="score-value">${percentage}%</p>
                </article>
              </div>

              ${mistakesHtml}

              <div class="result-actions">
                <button type="button" class="primary-button" data-action="restart">Berriro hasi · R</button>
                <button type="button" class="secondary-button" data-action="menu">Menura · M</button>
                <button type="button" class="dark-button" data-action="review-current" ${state.mistakes.length === 0 ? "disabled" : ""}>Akatsak landu · A</button>
              </div>
            </div>
          </section>
        </main>
      `;
    }

    function render() {
      if (state.screen === "menu") {
        app.innerHTML = renderMenu();
        return;
      }

      if (state.screen === "results") {
        app.innerHTML = renderResults();
        return;
      }

      const currentQuestion = getCurrentQuestion();
      const currentModeConfig = getCurrentModeConfig();
      if (!currentQuestion || !currentModeConfig) {
        app.innerHTML = `<main class="page"><section class="shell narrow"><div class="content">Kargatzen...</div></section></main>`;
        return;
      }

      app.innerHTML = renderQuiz();
    }

    app.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;

      const action = button.dataset.action;

      if (action === "start") {
        const nextMode = button.dataset.mode;
        const pool = nextMode === "review" ? state.lastMistakes : quizData;
        startQuiz(nextMode, pool);
      }

      if (action === "answer") {
        handleAnswerClick(button.dataset.option);
      }

      if (action === "next") {
        handleNext();
      }

      if (action === "menu") {
        goToMenu();
      }

      if (action === "restart") {
        const pool = state.mode === "review" ? state.lastMistakes : quizData;
        startQuiz(state.mode, pool);
      }

      if (action === "review-current") {
        startQuiz("review", state.mistakes);
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.repeat) return;

      if (state.screen === "menu") {
        if (event.key === "1") startQuiz("practice");
        if (event.key === "2") startQuiz("exam");
        if (event.key === "3" && state.lastMistakes.length > 0) startQuiz("review", state.lastMistakes);
        return;
      }

      if (state.screen === "results") {
        const key = event.key.toLowerCase();
        if (key === "m") goToMenu();
        if (key === "r" && state.mode) startQuiz(state.mode, state.mode === "review" ? state.lastMistakes : quizData);
        if (key === "a" && state.mistakes.length > 0) startQuiz("review", state.mistakes);
        return;
      }

      if (state.screen === "quiz") {
        const key = event.key.toLowerCase();
        if (key === "m") {
          goToMenu();
          return;
        }

        if (!state.selectedOption) {
          const optionNumber = Number(event.key);
          if (optionNumber >= 1 && optionNumber <= state.shuffledOptions.length) {
            handleAnswerClick(state.shuffledOptions[optionNumber - 1]);
          }
          return;
        }

        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          handleNext();
        }
      }
    });

    render();
  </script>
</body>
</html>
